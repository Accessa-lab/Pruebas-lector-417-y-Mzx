<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Cédulas CO - Operativo Total</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 15px; background-color: #0f172a; color: #f8fafc; }
        .container { max-width: 500px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        
        #reader-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #3b82f6; margin-top: 10px; }
        #reader-wrapper { width: 100%; }
        #reader { width: 100%; }
        
        /* Forzar que el video nativo use todo el contenedor sin deformarse */
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        
        /* Haz láser de escaneo dinámico */
        .laser-line { position: absolute; top: 50%; left: 5%; width: 90%; height: 3px; background-color: #ef4444; box-shadow: 0 0 12px #ef4444; z-index: 10; transform: translateY(-50%); pointer-events: none; animation: escaneoRápido 2s infinite ease-in-out; }
        @keyframes escaneoRápido { 0%, 100% { top: 25%; opacity: 0.6; } 50% { top: 75%; opacity: 1; } }

        .congelado-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(16, 185, 129, 0.35); display: none; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; color: #10b981; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 11; }
        
        button { background-color: #10b981; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; display: none; }
        button:hover { background-color: #059669; }
        
        .select-wrapper { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background-color: #0f172a; color: #f1f5f9; border: 1px solid #334155; font-size: 14px; outline: none; cursor: pointer; }

        .tabla-datos { width: 100%; margin-top: 20px; border-collapse: collapse; background: #0f172a; border-radius: 8px; overflow: hidden; display: none; text-align: left; }
        .tabla-datos th, .tabla-datos td { padding: 12px 15px; border-bottom: 1px solid #334155; }
        .tabla-datos th { background-color: #1e293b; color: #94a3b8; font-size: 13px; text-transform: uppercase; width: 35%; }
        .tabla-datos td { color: #f1f5f9; font-weight: 500; font-size: 15px; }
        .badge-tipo { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #eab308; color: #000; }
        
        #debug-box { margin-top: 15px; background: #000; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; text-align: left; border-radius: 6px; max-height: 60px; overflow-y: auto; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador de Cédulas CO</h2>
    <p id="txt-status" style="font-size: 13px; color: #3b82f6; margin-top: -10px; font-weight: bold;">Cargando flujo de video...</p>
    
    <div class="select-wrapper">
        <label for="video-source">Lente de Hardware:</label>
        <select id="video-source">
            <option value="environment" selected>📸 Cámara Trasera Principal</option>
            <option value="user">🤳 Cámara Frontal (Selfie)</option>
        </select>
    </div>

    <button id="btn-nueva-lectura">🔄 Escanear Siguiente Cédula</button>

    <div id="reader-container">
        <div class="laser-line" id="laser"></div>
        <div id="reader-wrapper">
            <div id="reader"></div>
        </div>
        <div id="overlay" class="congelado-overlay">✓ LECTURA CORRECTA</div>
    </div>

    <table id="tabla-info" class="tabla-datos">
        <tr><th>Tipo Doc</th><td><span id="res-tipo" class="badge-tipo">-</span></td></tr>
        <tr><th>Documento</th><td id="res-cedula" style="color: #3b82f6; font-weight: bold; font-size: 18px;">-</td></tr>
        <tr><th>Apellidos</th><td id="res-apellidos">-</td></tr>
        <tr><th>Nombres</th><td id="res-nombres">-</td></tr>
        <tr><th>Género</th><td id="res-genero">-</td></tr>
    </table>

    <div id="debug-box">Consola: Inicializando...</div>
</div>

<script>
    let html5QrcodeScanner = null;
    const btnNuevaLectura = document.getElementById('btn-nueva-lectura');
    const overlay = document.getElementById('overlay');
    const laser = document.getElementById('laser');
    const tablaInfo = document.getElementById('tabla-info');
    const debugBox = document.getElementById('debug-box');
    const cameraSelect = document.getElementById('video-source');
    const readerWrapper = document.getElementById('reader-wrapper');
    const txtStatus = document.getElementById('txt-status');
    
    let scanActive = false;
    let inicializadoPorToque = false;

    function logDebug(msg) {
        debugBox.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'success') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.stop(audioCtx.currentTime + 0.15);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // PURGA ABSOLUTA DEL NODO (Mantiene el intercambio libre de bloqueos)
    function recrearNodoLector() {
        readerWrapper.innerHTML = '<div id="reader"></div>';
    }

    function enumerarHardware() {
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length > 0 && devices[0].label !== "") {
                const currentValue = cameraSelect.value;
                cameraSelect.innerHTML = ""; 

                const optEnv = document.createElement('option');
                optEnv.value = "environment";
                optEnv.text = "📸 Cámara Trasera Principal";
                cameraSelect.appendChild(optEnv);

                devices.forEach((device) => {
                    if (!device.label.toLowerCase().includes('front') && !device.label.toLowerCase().includes('selfie')) {
                        const option = document.createElement('option');
                        option.value = device.id;
                        option.text = device.label || `Lente Trasero Alterno`;
                        cameraSelect.appendChild(option);
                    }
                });

                const optUser = document.createElement('option');
                optUser.value = "user";
                optUser.text = "🤳 Cámara Frontal (Selfie)";
                cameraSelect.appendChild(optUser);

                cameraSelect.value = currentValue;
            }
        }).catch(() => {});
    }

    // CONMUTADOR CONTINUO ANTI-BLOQUEOS PRESERVADO
    cameraSelect.addEventListener('change', () => {
        if (html5QrcodeScanner) {
            logDebug("Cambiando lente activo de forma segura...");
            scanActive = false;
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner = null;
                setTimeout(ejecutarFlujoEscaneo, 250);
            }).catch(() => {
                html5QrcodeScanner = null;
                setTimeout(ejecutarFlujoEscaneo, 250);
            });
        } else {
            ejecutarFlujoEscaneo();
        }
    });

    // --- PARSER MEJORADO PARA ALTA DENSIDAD (CÉDULA AMARILLA) ---
    function parsearPDF417(text) {
        try {
            let limpia = text.replace(/[^A-Z0-9Ñ ]/gi, ' ').toUpperCase();
            let bloquesNumeros = limpia.match(/\d{5,11}/g);
            if (!bloquesNumeros) return null;
            
            // Discriminador de número de documento legítimo frente a seriales impresos
            let cedula = "";
            for (let num of bloquesNumeros) {
                if (num.length >= 6 && num.length <= 10) {
                    cedula = parseInt(num, 10).toString();
                    break;
                }
            }
            if (!cedula) cedula = parseInt(bloquesNumeros[0], 10).toString();
            
            let posCedula = limpia.indexOf(cedula);
            let subcadenaTexto = limpia.substring(posCedula + cedula.length);
            let palabras = subcadenaTexto.match(/[A-ZÑ]{3,}/g) || limpia.match(/[A-ZÑ]{3,}/g) || [];
            
            let apellidos = `${palabras[0] || ""} ${palabras[1] || ""}`.trim();
            let nombres = `${palabras[2] || palabras[1] || "Ciudadano"} ${palabras[3] || ""}`.trim();

            if (!palabras[0]) {
                apellidos = "No extraído (Código Difuso)";
                nombres = "No extraído (Código Difuso)";
            }

            return {
                tipo: "Cédula Amarilla / Digital",
                cedula: cedula,
                apellidos: apellidos,
                nombres: nombres,
                genero: text.includes("M") ? "Masculino" : text.includes("F") ? "Femenino" : "No detectado"
            };
        } catch (e) { 
            return null; 
        }
    }

    function parsearQRDigital(text) {
        if (!text.includes("<<")) return null;
        try {
            const mrzMatch = text.match(/(I[A-Z]DCO\d+[^]+)/);
            if (!mrzMatch) return null;
            const limpia = mrzMatch[1].replace(/\s+/g, '');
            const cedulaMatch = limpia.match(/DCO(\d+)/);
            const cedula = cedulaMatch ? parseInt(cedulaMatch[1], 10).toString() : null;
            const bloqueNombres = limpia.match(/([A-Z<]+)<<([A-Z<]+)/);
            if (!cedula || !bloqueNombres) return null;
            return {
                tipo: "Digital (QR)", cedula: cedula,
                apellidos: bloqueNombres[1].replace(/</g, ' ').trim(),
                nombres: bloqueNombres[2].replace(/</g, ' ').trim(),
                genero: limpia.includes("M") ? "Masculino" : "Femenino"
            };
        } catch (e) { return null; }
    }

    // --- MOTOR DE ESCANEO CON ARRANQUE GARANTIZADO (FALLBACK) ---
    function ejecutarFlujoEscaneo() {
        scanActive = true;
        recrearNodoLector();
        laser.style.display = "block";
        
        html5QrcodeScanner = new Html5Qrcode("reader");
        const selectedValue = cameraSelect.value;

        // PARÁMETROS DE ARRANQUE 1: Configuración de ultra nitidez (Ideal)
        let configCamaraHD;
        if (selectedValue === "environment") {
            configCamaraHD = { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } };
        } else if (selectedValue === "user") {
            configCamaraHD = { facingMode: "user" };
        } else {
            configCamaraHD = { deviceId: selectedValue, width: { ideal: 1280 }, height: { ideal: 720 } };
        }

        // OPTIMIZACIÓN DEL ÁREA DE LECTURA PARA CÉDULAS
        // Dimensiones balanceadas (Ancho: 92%, Alto: 48%) que evitan distorsión y procesan rápido el PDF417
        const configVisual = { 
            fps: 30, 
            qrbox: (w, h) => { return { width: w * 0.92, height: h * 0.48 }; }, 
            formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.PDF_417 ]
        };

        txtStatus.innerText = "Sincronizando cámara...";
        txtStatus.style.color = "#eab308";

        // Callback unificado de éxito en decodificación
        const alDetectarCodigo = (decodedText, decodedResult) => {
            if (!scanActive) return;

            let datos = null;
            const format = decodedResult.result.format.formatName;

            if (format === "PDF_417") datos = parsearPDF417(decodedText);
            else if (format === "QR_CODE") datos = parsearQRDigital(decodedText);

            if (datos) {
                scanActive = false;
                playSound('success');
                
                // CONGELAMIENTO INMEDIATO DE HARDWARE DE VIDEO
                const videoEl = document.querySelector('#reader video');
                if (videoEl) {
                    videoEl.pause(); 
                    videoEl.style.filter = "contrast(1.15) brightness(1.05)";
                }

                laser.style.display = "none";
                document.getElementById('res-tipo').innerText = datos.tipo;
                document.getElementById('res-cedula').innerText = datos.cedula;
                document.getElementById('res-apellidos').innerText = datos.apellidos;
                document.getElementById('res-nombres').innerText = datos.nombres;
                document.getElementById('res-genero').innerText = datos.genero;
                
                tablaInfo.style.display = 'table';
                overlay.style.display = 'flex';
                btnNuevaLectura.style.display = 'block';
                
                txtStatus.innerText = "✓ Cédula leída con éxito";
                txtStatus.style.color = "#10b981";
            }
        };

        // INTENTO DE ARRANQUE EN CADENA (Garantiza ejecución sin importar el dispositivo)
        html5QrcodeScanner.start(configCamaraHD, configVisual, alDetectarCodigo, () => {})
        .then(() => {
            txtStatus.innerText = "Escáner Activo • Ubique el código de barras";
            txtStatus.style.color = "#10b981";
            logDebug("Lente principal en alta definición.");
            setTimeout(enumerarHardware, 350);
        })
        .catch(err => {
            logDebug("Lente HD restringido. Lanzando modo de compatibilidad...");
            
            // FALLBACK AUTOMÁTICO INSTANTÁNEO: Si la resolución falla, arranca el lente básico sin trabar la web
            let configCamaraSegura = (selectedValue === "user") ? { facingMode: "user" } : { facingMode: "environment" };
            
            html5QrcodeScanner.start(configCamaraSegura, configVisual, alDetectarCodigo, () => {})
            .then(() => {
                txtStatus.innerText = "Escáner Activo (Modo Adaptativo)";
                txtStatus.style.color = "#10b981";
                setTimeout(enumerarHardware, 350);
            })
            .catch(err2 => {
                txtStatus.innerText = "⚠️ Permiso de cámara denegado.";
                txtStatus.style.color = "#ef4444";
                logDebug("Error total de acceso óptico.");
            });
        });
    }

    function arrancarEscaner() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        btnNuevaLectura.style.display = 'none';
        tablaInfo.style.display = 'none';
        overlay.style.display = 'none';
        ejecutarFlujoEscaneo();
    }

    function prepararSiguienteLectura() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner = null;
                setTimeout(arrancarEscaner, 150);
            }).catch(() => {
                html5QrcodeScanner = null;
                arrancarEscaner();
            });
        } else {
            arrancarEscaner();
        }
    }

    // Inicialización automática al cargar
    window.addEventListener('DOMContentLoaded', () => {
        cameraSelect.value = "environment";
        setTimeout(arrancarEscaner, 300);

        // Activador de respaldo si las restricciones de gestos del navegador bloquean el auto-arranque
        const disparadorGestos = () => {
            if (!scanActive && !inicializadoPorToque) {
                inicializadoPorToque = true;
                arrancarEscaner();
                document.removeEventListener('click', disparadorGestos);
                document.removeEventListener('touchstart', disparadorGestos);
            }
        };
        document.addEventListener('click', disparadorGestos);
        document.addEventListener('touchstart', disparadorGestos);
    });

    btnNuevaLectura.addEventListener('click', prepararSiguienteLectura);
</script>
</body>
</html>
