<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Cédulas CO - Hard Lock</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 15px; background-color: #0f172a; color: #f8fafc; }
        .container { max-width: 500px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        #reader-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #3b82f6; margin-top: 10px; }
        #reader { width: 100%; }
        
        .congelado-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 188, 156, 0.25); display: none; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; color: #2ecc71; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
        
        button { background-color: #3b82f6; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #2563eb; }
        #btn-nueva-lectura { background-color: #10b981; display: none; }
        #btn-stop { background-color: #ef4444; margin-top: 10px; font-size: 14px; padding: 8px; }
        
        .select-wrapper { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background-color: #0f172a; color: #f1f5f9; border: 1px solid #334155; font-size: 14px; outline: none; cursor: pointer; }

        .tabla-datos { width: 100%; margin-top: 20px; border-collapse: collapse; background: #0f172a; border-radius: 8px; overflow: hidden; display: none; text-align: left; }
        .tabla-datos th, .tabla-datos td { padding: 12px 15px; border-bottom: 1px solid #334155; }
        .tabla-datos th { background-color: #1e293b; color: #94a3b8; font-size: 13px; text-transform: uppercase; width: 35%; }
        .tabla-datos td { color: #f1f5f9; font-weight: 500; font-size: 15px; }
        .badge-tipo { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #3b82f6; }
        
        #debug-box { margin-top: 15px; background: #000; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; text-align: left; border-radius: 6px; max-height: 80px; overflow-y: auto; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador de Cédulas CO</h2>
    <p style="font-size: 13px; color: #94a3b8; margin-top: -10px;">Lector optimizado de códigos de barras de alta densidad</p>
    
    <div class="select-wrapper">
        <label for="video-source">Seleccionar Lente:</label>
        <select id="video-source">
            <option value="environment" selected>📸 Forzar Cámara Trasera (Principal)</option>
            <option value="user">🤳 Cámara Frontal (Selfie)</option>
        </select>
    </div>

    <button id="btn-start">Iniciar Escáner</button>
    <button id="btn-nueva-lectura">🔄 Nueva Lectura</button>

    <div id="reader-container">
        <div id="reader"></div>
        <div id="overlay" class="congelado-overlay">✓ LECTURA CORRECTA</div>
    </div>

    <button id="btn-stop" style="display:none;">Apagar Cámara</button>

    <table id="tabla-info" class="tabla-datos">
        <tr><th>Tipo Doc</th><td><span id="res-tipo" class="badge-tipo">-</span></td></tr>
        <tr><th>Documento</th><td id="res-cedula" style="color: #3b82f6; font-weight: bold; font-size: 18px;">-</td></tr>
        <tr><th>Apellidos</th><td id="res-apellidos">-</td></tr>
        <tr><th>Nombres</th><td id="res-nombres">-</td></tr>
        <tr><th>Género</th><td id="res-genero">-</td></tr>
    </table>

    <div id="debug-box">Consola: Esperando ejecución...</div>
</div>

<script>
    let html5QrcodeScanner;
    const btnStart = document.getElementById('btn-start');
    const btnNuevaLectura = document.getElementById('btn-nueva-lectura');
    const btnStop = document.getElementById('btn-stop');
    const overlay = document.getElementById('overlay');
    const tablaInfo = document.getElementById('tabla-info');
    const debugBox = document.getElementById('debug-box');
    const cameraSelect = document.getElementById('video-source');
    
    let scanActive = false;

    function logDebug(msg) {
        debugBox.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    }

    // --- AUDIO NATIVO ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'success') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.stop(audioCtx.currentTime + 0.15);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- LISTAR CÁMARAS DISPONIBLES ---
    function enumerarHardwareDisponible() {
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length > 0 && devices[0].label !== "") {
                const currentValue = cameraSelect.value;
                cameraSelect.innerHTML = ""; 

                // Mantener los accesos directos por directiva nativa arriba
                const optEnv = document.createElement('option');
                optEnv.value = "environment";
                optEnv.text = "📸 Forzar Cámara Trasera (Principal)";
                cameraSelect.appendChild(optEnv);

                devices.forEach((device) => {
                    const option = document.createElement('option');
                    option.value = device.id;
                    option.text = device.label || `Lente ID: ${device.id.substring(0,5)}...`;
                    cameraSelect.appendChild(option);
                });

                const optUser = document.createElement('option');
                optUser.value = "user";
                optUser.text = "🤳 Cámara Frontal (Selfie)";
                cameraSelect.appendChild(optUser);

                cameraSelect.value = currentValue;
                logDebug("Mapeo de lentes actualizado.");
            }
        }).catch(() => { /* Silencioso hasta el primer click */ });
    }

    // --- DETECTOR DE CAMBIO DE LENTE ---
    cameraSelect.addEventListener('change', () => {
        if (scanActive && html5QrcodeScanner) {
            logDebug("Intercambiando lente en caliente...");
            scanActive = false;
            html5QrcodeScanner.stop().then(() => {
                setTimeout(ejecutarFlujoEscaneo, 300);
            }).catch(() => {
                setTimeout(ejecutarFlujoEscaneo, 300);
            });
        }
    });

    // --- PARSERS DE CÓDIGOS ---
    function parsearPDF417(text) {
        try {
            let limpia = text.replace(/[^A-Z0-9Ñ ]/gi, ' ').toUpperCase();
            let bloquesNumeros = limpia.match(/\d{5,12}/g);
            if (!bloquesNumeros) return null;
            
            let cedulaRaw = bloquesNumeros[0];
            let cedula = parseInt(cedulaRaw, 10).toString();
            let posCedula = limpia.indexOf(cedulaRaw);
            let subcadenaTexto = limpia.substring(posCedula + cedulaRaw.length);
            let palabras = subcadenaTexto.match(/[A-ZÑ]{2,}/g) || [];
            
            if (!palabras[0] || !palabras[2]) return null;

            return {
                tipo: "Física (PDF417)", cedula: cedula,
                apellidos: `${palabras[0]} ${palabras[1] || ""}`.trim(),
                nombres: `${palabras[2]} ${palabras[3] || ""}`.trim(),
                genero: text.includes("M") ? "Masculino" : text.includes("F") ? "Femenino" : "No detectado"
            };
        } catch (e) { return null; }
    }

    function parsearQRDigital(text) {
        if (!text.includes("<<")) return null;
        try {
            const mrzMatch = text.match(/(I[A-Z]DCO\d+[^]+)/);
            if (!mrzMatch) return null;
            const limpia = mrzMatch[1].replace(/\s+/g, '');
            const cedulaMatch = limpia.match(/DCO(\d+)/);
            const cedula = cedulaMatch ? parseInt(cedulaMatch[1], 10).toString() : null;
            const bloqueNombres = limpia.match(/([A-Z<]+)<<([A-Z<]+)/);
            if (!cedula || !bloqueNombres) return null;
            return {
                tipo: "Digital (QR)", cedula: cedula,
                apellidos: bloqueNombres[1].replace(/</g, ' ').trim(),
                nombres: bloqueNombres[2].replace(/</g, ' ').trim(),
                genero: limpia.includes("M") ? "Masculino" : "Femenino"
            };
        } catch (e) { return null; }
    }

    // --- MOTOR DE ESCANEO RE-INGENIERADO ---
    function ejecutarFlujoEscaneo() {
        scanActive = true;
        
        // Limpieza completa del nodo del DOM para destruir flujos congelados en segundo plano
        document.getElementById('reader').innerHTML = ""; 
        html5QrcodeScanner = new Html5Qrcode("reader");

        const selectedValue = cameraSelect.value;
        let targetConstraint;

        // AQUÍ ESTÁ LA CORRECCIÓN CRUCIAL:
        // Construimos restricciones de MediaTrack directas y estrictas para evitar fallbacks del navegador.
        if (selectedValue === "environment") {
            targetConstraint = { facingMode: { exact: "environment" } };
        } else if (selectedValue === "user") {
            targetConstraint = { facingMode: { exact: "user" } };
        } else {
            // Forzado de ID por hardware puro usando la propiedad 'exact'
            targetConstraint = { deviceId: { exact: selectedValue } };
        }

        // Configuración fluida eliminando restricciones de aspecto fijas que hacían saltar la cámara al default
        const config = { 
            fps: 25, 
            qrbox: (w, h) => { return { width: w * 0.9, height: h * 0.60 }; },
            formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.PDF_417 ]
        };

        logDebug("Sincronizando sensor óptico seleccionado...");

        html5QrcodeScanner.start(
            targetConstraint, 
            config,
            (decodedText, decodedResult) => {
                if (!scanActive) return;

                let datos = null;
                const format = decodedResult.result.format.formatName;

                if (format === "PDF_417") datos = parsearPDF417(decodedText);
                else if (format === "QR_CODE") datos = parsearQRDigital(decodedText);

                if (datos) {
                    scanActive = false;
                    playSound('success');
                    const videoEl = document.querySelector('#reader video');
                    if (videoEl) videoEl.pause();

                    document.getElementById('res-tipo').innerText = datos.tipo;
                    document.getElementById('res-cedula').innerText = datos.cedula;
                    document.getElementById('res-apellidos').innerText = datos.apellidos;
                    document.getElementById('res-nombres').innerText = datos.nombres;
                    document.getElementById('res-genero').innerText = datos.genero;
                    
                    tablaInfo.style.display = 'table';
                    overlay.style.display = 'flex';
                    btnNuevaLectura.style.display = 'block';
                    btnStop.style.display = 'none';
                    logDebug(`Cédula decodificada con éxito.`);
                } else {
                    scanActive = false;
                    playSound('error');
                    alert("Código detectado. Coloque el código de barras de la cédula dentro del recuadro.");
                    prepararSiguienteLectura();
                }
            },
            (err) => { /* Captura ráfaga continua */ }
        ).then(() => {
            logDebug("Lente bloqueado y transmitiendo.");
            // Si el navegador tenía bloqueadas las etiquetas de hardware, este disparo las desbloquea y enumera
            setTimeout(enumerarHardwareDisponible, 400);
        }).catch(err => {
            logDebug(`Fallo de hardware: Ocupado o incompatible.`);
            
            // Si falla por el bloqueo 'exact' (común en computadores de escritorio sin cámara trasera),
            // hace un fallback controlado e inteligente a modo genérico
            if (selectedValue === "environment") {
                logDebug("Reintentando en modo adaptable...");
                html5QrcodeScanner.start({ facingMode: "environment" }, config, () => {}, () => {});
            }
        });
    }

    function arrancarEscaner() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        btnStart.style.display = 'none';
        btnNuevaLectura.style.display = 'none';
        btnStop.style.display = 'block';
        tablaInfo.style.display = 'none';
        overlay.style.display = 'none';

        ejecutarFlujoEscaneo();
    }

    function comprobarYRefrescarPermisos() {
        Html5Qrcode.getCameras().then(() => {
            enumerarHardwareDisponible();
        }).catch(() => {});
    }

    window.addEventListener('DOMContentLoaded', comprobarYRefrescarPermisos);
    btnStart.addEventListener('click', arrancarEscaner);
    btnNuevaLectura.addEventListener('click', prepararSiguienteLectura);
    
    function prepararSiguienteLectura() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                setTimeout(arrancarEscaner, 200);
            }).catch(() => arrancarEscaner());
        } else {
            arrancarEscaner();
        }
    }

    btnStop.addEventListener('click', () => {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                scanActive = false;
                btnStart.style.display = 'block';
                btnNuevaLectura.style.display = 'none';
                btnStop.style.display = 'none';
                tablaInfo.style.display = 'none';
                overlay.style.display = 'none';
                logDebug("Cámara liberada.");
            });
        }
    });
</script>
</body>
</html>
